name: Android CI (Apenas Testes Unitários)
run-name: 🚀 CI Unit Tests | "${{ github.event.head_commit.message }}"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Create Mock google-services.json
        run: |
          echo '{
            "project_info": {
              "project_number": "123456789",
              "project_id": "mock-id",
              "storage_bucket": "mock.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789:android:123456",
                  "android_client_info": {
                    "package_name": "com.game.impostor"
                  }
                },
                "api_key": [
                  {
                    "current_key": "mock_api_key"
                  }
                ],
                "services": {}
              }
            ],
            "configuration_version": "3"
          }' > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest


